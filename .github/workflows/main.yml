name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  list-dockerfiles:
    runs-on: ubuntu-latest

    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}

    steps:
      - uses: actions/checkout@v7

      - id: set-matrix
        run: echo "matrix=$(find . -type f -name 'Dockerfile' -exec dirname {} \; | sort -u | jq -R -s -c 'split("\n")[:-1]')" >> $GITHUB_OUTPUT

  docker-lint:
    needs: list-dockerfiles
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        dockerfile: ${{ fromJson(needs.list-dockerfiles.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v7

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: ${{ matrix.dockerfile }}/Dockerfile

  docker-build:
    needs: [list-dockerfiles, docker-lint]
    runs-on: ubuntu-latest

    permissions:
      packages: write

    strategy:
      fail-fast: false
      matrix:
        dockerfile: ${{ fromJson(needs.list-dockerfiles.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v7

      - name: Create Docker Image name
        id: create-image-name
        run: echo "image=ghcr.io/emmanuelgautier/awesome-dockerfiles/$(echo ${{ matrix.dockerfile }} | awk -F'/' '{print $NF}'):latest" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.dockerfile }}
          load: true
          tags: ${{ steps.create-image-name.outputs.image }}
          cache-from: type=registry,ref=${{ steps.create-image-name.outputs.image }}
          cache-to: type=inline

      - name: Determine required runtime env vars
        id: image-env
        run: |
          case "${{ matrix.dockerfile }}" in
            */laravel)
              echo "args=-e APP_KEY=base64:$(openssl rand -base64 32) -e SESSION_DRIVER=file -e CACHE_STORE=file -e QUEUE_CONNECTION=sync" >> "$GITHUB_OUTPUT"
              ;;
            */symfony)
              echo "args=-e APP_SECRET=$(openssl rand -hex 32)" >> "$GITHUB_OUTPUT"
              ;;
            */rails)
              echo "args=-e SECRET_KEY_BASE=$(openssl rand -hex 64)" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "args=" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Run image and test homepage
        run: |
          image="${{ steps.create-image-name.outputs.image }}"
          container_id=$(docker run -d -P ${{ steps.image-env.outputs.args }} "$image")

          cleanup() {
            docker logs "$container_id" || true
            docker rm -f "$container_id" > /dev/null
          }
          trap cleanup EXIT

          port=""
          for i in $(seq 1 10); do
            port=$(docker inspect -f '{{range $p, $conf := .NetworkSettings.Ports}}{{(index $conf 0).HostPort}}{{end}}' "$container_id")
            [ -n "$port" ] && break
            status=$(docker inspect -f '{{.State.Status}}' "$container_id")
            if [ "$status" != "running" ] && [ "$status" != "created" ]; then
              echo "Container exited early with status: $status"
              exit 1
            fi
            sleep 3
          done
          if [ -z "$port" ]; then
            echo "No published port found for $image"
            exit 1
          fi

          for i in $(seq 1 10); do
            if curl -sf "http://localhost:$port/" > /dev/null; then
              echo "Homepage reachable on port $port"
              exit 0
            fi
            sleep 3
          done

          echo "Homepage not reachable on port $port"
          exit 1

      - name: Push image
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.create-image-name.outputs.image }}
          cache-from: type=registry,ref=${{ steps.create-image-name.outputs.image }}
          cache-to: type=inline
